name: Lint

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          check-latest: true
          cache: true
          cache-dependency-path: go.sum

      - name: Check linter configuration
        run: make lint-config

      - name: Run linter
        run: make lint
